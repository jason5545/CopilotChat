name: CopilotChat
options:
  bundleIdPrefix: com.copilotchat
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26"
  defaultConfig: Release
configs:
  Debug: debug
  Release: release
  Review: release
settings:
  SWIFT_VERSION: "6.0"
  SWIFT_STRICT_CONCURRENCY: complete
  GENERATE_INFOPLIST_FILE: YES
  INFOPLIST_KEY_CFBundleDisplayName: "Copilot Chat"
  INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"
targets:
  CopilotChatTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CopilotChatTests
    dependencies:
      - target: CopilotChat
    settings:
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/CopilotChat.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/CopilotChat"
      BUNDLE_LOADER: "$(TEST_HOST)"
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: MW4GWYGX56
  CopilotChat:
    type: application
    platform: iOS
    sources:
      - path: CopilotChat
        excludes:
          - "Clibgit2.xcframework/**"
          - "Info.plist"
          - "PrivacyInfo.xcprivacy"
    resources:
      - path: CopilotChat/PrivacyInfo.xcprivacy
    entitlements:
      path: CopilotChat/CopilotChat.entitlements
    dependencies:
      - framework: CopilotChat/Clibgit2.xcframework
        embed: false
    settings:
      configs:
        Review:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) REVIEW"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      INFOPLIST_FILE: CopilotChat/Info.plist
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
      INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: MW4GWYGX56
      PRODUCT_BUNDLE_IDENTIFIER: com.copilotchat.app
      TARGETED_DEVICE_FAMILY: "1,2"
      SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
      OTHER_LDFLAGS:
        - -lz
        - -liconv
