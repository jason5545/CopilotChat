name: CopilotChat
options:
  bundleIdPrefix: com.copilotchat
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
  xcodeVersion: "26"
  defaultConfig: Release
packages:
  swift-markdown:
    url: https://github.com/swiftlang/swift-markdown
    from: "0.5.0"
settings:
  SWIFT_VERSION: "6.0"
  SWIFT_STRICT_CONCURRENCY: complete
  GENERATE_INFOPLIST_FILE: YES
  INFOPLIST_KEY_CFBundleDisplayName: "Copilot Chat"
  INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"
targets:
  CopilotChatTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CopilotChatTests
    dependencies:
      - target: CopilotChat
    settings:
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/CopilotChat.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/CopilotChat"
      BUNDLE_LOADER: "$(TEST_HOST)"
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: MW4GWYGX56
  CopilotChat:
    type: application
    platform: iOS
    sources:
      - path: CopilotChat
        excludes:
          - "Clibgit2.xcframework/**"
    resources:
      - path: CopilotChat/PrivacyInfo.xcprivacy
    entitlements:
      path: CopilotChat/CopilotChat.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.copilotchat.app
        com.apple.developer.icloud-container-environment: Production
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.copilotchat.app
        com.apple.developer.ubiquity-kvstore-identifier: "$(TeamIdentifierPrefix)com.copilotchat.app"
        keychain-access-groups:
          - "$(AppIdentifierPrefix)com.copilotchat.app"
    dependencies:
      - framework: CopilotChat/Clibgit2.xcframework
        embed: false
      - package: swift-markdown
        product: Markdown
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_FILE: CopilotChat/Info.plist
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: MW4GWYGX56
        PRODUCT_BUNDLE_IDENTIFIER: com.copilotchat.app
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        OTHER_LDFLAGS:
          - -lz
          - -liconv
      configs:
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
  CopilotChatMac:
    type: application
    platform: macOS
    sources:
      - path: CopilotChat
        excludes:
          - "Clibgit2.xcframework/**"
          - "Models/SwiftGit/**"
          - "Models/GitHubPlugin.swift"
    resources:
      - path: CopilotChat/PrivacyInfo.xcprivacy
    entitlements:
      path: CopilotChat/CopilotChatMac.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.copilotchat.app
        com.apple.developer.icloud-container-environment: Production
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.copilotchat.app
        com.apple.developer.ubiquity-kvstore-identifier: "$(TeamIdentifierPrefix)com.copilotchat.app"
        keychain-access-groups:
          - "$(AppIdentifierPrefix)com.copilotchat.app"
    dependencies:
      - package: swift-markdown
        product: Markdown
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_FILE: CopilotChat/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: MW4GWYGX56
        PRODUCT_BUNDLE_IDENTIFIER: com.copilotchat.mac
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        OTHER_LDFLAGS:
          - -lz
          - -liconv
      configs:
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
